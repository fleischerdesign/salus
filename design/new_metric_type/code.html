<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Metric Type - Salus</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-surface": "#213145",
                      "surface-dim": "#cbdbf5",
                      "primary-fixed": "#e2dfff",
                      "on-background": "#0b1c30",
                      "on-primary-fixed-variant": "#3323cc",
                      "surface-container-lowest": "#ffffff",
                      "inverse-primary": "#c3c0ff",
                      "background": "#f8f9ff",
                      "on-primary-fixed": "#0f0069",
                      "outline-variant": "#c7c4d8",
                      "surface-container-high": "#dce9ff",
                      "surface-tint": "#4d44e3",
                      "primary-container": "#4f46e5",
                      "surface-bright": "#f8f9ff",
                      "error-container": "#ffdad6",
                      "inverse-on-surface": "#eaf1ff",
                      "surface": "#f8f9ff",
                      "surface-container-highest": "#d3e4fe",
                      "primary": "#3525cd",
                      "tertiary-fixed-dim": "#4edea3",
                      "surface-container-low": "#eff4ff",
                      "on-tertiary": "#ffffff",
                      "error": "#ba1a1a",
                      "on-primary-container": "#dad7ff",
                      "primary-fixed-dim": "#c3c0ff",
                      "on-secondary-fixed": "#001e2f",
                      "on-secondary-container": "#004666",
                      "on-tertiary-container": "#67f4b7",
                      "on-surface-variant": "#464555",
                      "tertiary-container": "#006e4b",
                      "tertiary": "#005338",
                      "on-error": "#ffffff",
                      "outline": "#777587",
                      "on-tertiary-fixed-variant": "#005236",
                      "secondary": "#006591",
                      "secondary-container": "#39b8fd",
                      "on-error-container": "#93000a",
                      "on-tertiary-fixed": "#002113",
                      "surface-variant": "#d3e4fe",
                      "on-primary": "#ffffff",
                      "on-surface": "#0b1c30",
                      "on-secondary-fixed-variant": "#004c6e",
                      "on-secondary": "#ffffff",
                      "secondary-fixed": "#c9e6ff",
                      "secondary-fixed-dim": "#89ceff",
                      "tertiary-fixed": "#6ffbbe",
                      "surface-container": "#e5eeff"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "stack-md": "1rem",
                      "stack-lg": "2rem",
                      "stack-sm": "0.5rem",
                      "gutter": "1.5rem",
                      "container-padding": "2rem",
                      "max-width": "960px"
              },
              "fontFamily": {
                      "body-lg": [
                              "Inter"
                      ],
                      "headline-lg": [
                              "Inter"
                      ],
                      "label-caps": [
                              "Inter"
                      ],
                      "body-sm": [
                              "Inter"
                      ],
                      "headline-md": [
                              "Inter"
                      ],
                      "headline-lg-mobile": [
                              "Inter"
                      ],
                      "metric-display": [
                              "Inter"
                      ]
              },
              "fontSize": {
                      "body-lg": [
                              "16px",
                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "400"
                              }
                      ],
                      "headline-lg": [
                              "32px",
                              {
                                      "lineHeight": "40px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "label-caps": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "600"
                              }
                      ],
                      "body-sm": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "400"
                              }
                      ],
                      "headline-md": [
                              "20px",
                              {
                                      "lineHeight": "28px",
                                      "fontWeight": "600"
                              }
                      ],
                      "headline-lg-mobile": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "letterSpacing": "-0.01em",
                                      "fontWeight": "700"
                              }
                      ],
                      "metric-display": [
                              "40px",
                              {
                                      "lineHeight": "48px",
                                      "letterSpacing": "-0.03em",
                                      "fontWeight": "700"
                              }
                      ]
              }
      },
          },
        }
      </script>
<style>
        /* Form input enhancements */
        .salus-input {
            @apply border-outline-variant rounded-lg w-full px-4 py-3 bg-surface-container-lowest text-on-surface font-body-lg text-body-lg focus:ring-2 focus:ring-primary-fixed focus:border-primary transition-all outline-none;
        }
        .salus-label {
            @apply block mb-2 font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider;
        }
        .salus-btn-primary {
            @apply bg-primary text-on-primary font-body-lg text-body-lg font-semibold py-3 px-6 rounded-lg hover:bg-on-primary-fixed-variant transition-colors shadow-sm;
        }
        .salus-btn-ghost {
            @apply text-primary font-body-lg text-body-lg font-semibold py-3 px-6 rounded-lg hover:bg-surface-container transition-colors;
        }
        
        /* Modal background blur */
        .modal-backdrop {
            backdrop-filter: blur(8px);
            background-color: rgba(11, 28, 48, 0.4); /* on-background with opacity */
        }
    </style>
</head>
<body class="bg-background min-h-screen font-body-lg text-body-lg text-on-background overflow-hidden relative">
<!-- Background Context (simulated dashboard behind modal) -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
<div class="max-w-max-width mx-auto px-gutter pt-24 grid grid-cols-1 md:grid-cols-3 gap-stack-lg">
<div class="h-64 bg-surface rounded-xl border border-outline-variant"></div>
<div class="h-64 bg-surface rounded-xl border border-outline-variant"></div>
<div class="h-64 bg-surface rounded-xl border border-outline-variant"></div>
<div class="h-96 md:col-span-3 bg-surface rounded-xl border border-outline-variant"></div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop overflow-y-auto">
<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-lg rounded-xl shadow-lg border border-outline-variant relative animate-[fade-in-up_0.3s_ease-out]">
<!-- Header -->
<div class="flex items-center justify-between p-stack-md border-b border-outline-variant bg-surface-container-low rounded-t-xl">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">New Metric Type</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Define a custom tracking parameter.</p>
</div>
<button aria-label="Close modal" class="text-on-surface-variant hover:text-primary transition-colors p-2 rounded-full hover:bg-surface-container" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Form Body -->
<form class="p-stack-lg space-y-stack-md" hx-post="/api/metrics/new" hx-swap="outerHTML">
<!-- Metric Name -->
<div>
<label class="salus-label" for="metricName">Metric Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant" style="font-variation-settings: 'FILL' 0;">edit_note</span>
</div>
<input class="salus-input pl-10 border border-outline-variant" id="metricName" name="name" placeholder="e.g., Blood Pressure, Steps" required="" type="text"/>
</div>
</div>
<!-- Unit & Data Type Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div>
<label class="salus-label" for="metricUnit">Unit</label>
<input class="salus-input border border-outline-variant" id="metricUnit" name="unit" placeholder="e.g., bpm, mg/dL" type="text"/>
</div>
<div>
<label class="salus-label" for="dataType">Data Type</label>
<div class="relative">
<select class="salus-input border border-outline-variant appearance-none pr-10" id="dataType" name="type" required="">
<option value="number">Number</option>
<option value="boolean">Boolean (Yes/No)</option>
<option value="text">Text / Notes</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-outline">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">expand_more</span>
</div>
</div>
</div>
</div>
<!-- Color Selection (Visual selector replacing native picker) -->
<div>
<label class="salus-label">Accent Color</label>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-3">Choose a color for charts and indicators.</p>
<div class="flex flex-wrap gap-3">
<!-- Color Options -->
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="color" type="radio" value="red"/>
<div class="w-10 h-10 rounded-full bg-error border-2 border-transparent peer-checked:ring-2 peer-checked:ring-offset-2 peer-checked:ring-error transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-white opacity-0 peer-checked:opacity-100 text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="color" type="radio" value="blue"/>
<div class="w-10 h-10 rounded-full bg-secondary border-2 border-transparent peer-checked:ring-2 peer-checked:ring-offset-2 peer-checked:ring-secondary transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-white opacity-0 peer-checked:opacity-100 text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="color" type="radio" value="green"/>
<div class="w-10 h-10 rounded-full bg-tertiary border-2 border-transparent peer-checked:ring-2 peer-checked:ring-offset-2 peer-checked:ring-tertiary transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-white opacity-0 peer-checked:opacity-100 text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="color" type="radio" value="indigo"/>
<div class="w-10 h-10 rounded-full bg-primary border-2 border-transparent peer-checked:ring-2 peer-checked:ring-offset-2 peer-checked:ring-primary transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-white opacity-0 peer-checked:opacity-100 text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</label>
<!-- Custom Hex Input (Fallback/Advanced) -->
<div class="flex-1 flex items-center space-x-2 ml-4">
<span class="font-body-sm text-body-sm text-outline font-medium">#</span>
<input class="salus-input border border-outline-variant py-2 px-3 text-sm flex-1" pattern="^([A-Fa-f0-9]{6}|[A-Fa-f0-9]{3})$" placeholder="Hex" type="text"/>
</div>
</div>
</div>
<!-- Form Actions -->
<div class="pt-stack-md mt-stack-md border-t border-outline-variant flex justify-end space-x-4">
<button class="salus-btn-ghost" type="button">Cancel</button>
<button class="salus-btn-primary flex items-center" type="submit">
<span class="material-symbols-outlined mr-2" style="font-variation-settings: 'FILL' 1;">save</span>
                        Save Metric
                    </button>
</div>
</form>
</div>
</div>
<style>
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body></html>
