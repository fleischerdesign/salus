name: CI

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - run: nix develop --command uv run ruff check src/

  pyright:
    name: Pyright
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - run: nix develop --command uv run pyright src/

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: salus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Run tests (SQLite)
        run: nix develop --command uv run pytest -v
      - name: Run tests (PostgreSQL)
        run: nix develop --command uv run pytest -v
        env:
          SALUS_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/salus_test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: Install dependencies
        run: nix develop --command bash -c "cd frontend && npm ci"
      - name: Lint
        run: nix develop --command bash -c "cd frontend && npm run lint"
      - name: Test
        run: nix develop --command bash -c "cd frontend && npm run test"
      - name: Build
        run: nix develop --command bash -c "cd frontend && npm run build"
      - name: Type check
        run: nix develop --command bash -c "cd frontend && npm run check"
