{% from "components/ui/alert.html" import alert %}
<div class="form-stack">
    {% call alert(type="success") -%}
        <strong>{{ _("Copy this token now — it won't be shown again.") }}</strong>
        <br>
        <code id="new-token-value">{{ plaintext_token }}</code>
    {%- endcall %}
</div>
