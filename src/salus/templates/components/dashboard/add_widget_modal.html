<div class="modal-backdrop" data-open role="dialog" aria-modal="true" aria-labelledby="add-widget-title"
     _="on click if event.target === me then remove me end
        on keydown[key is 'Escape'] remove me">
    <div class="modal-content">
        <button class="modal__close" aria-label="Close" type="button"
                _="on click remove closest .modal-backdrop">
            <span class="material-symbols-outlined" aria-hidden="true">close</span>
        </button>
        <h2 class="modal__title" id="add-widget-title">{{ _("Add Widget") }}</h2>
        <div class="modal__body">
            <form hx-post="/dashboard/widgets/add"
                  hx-on::afterRequest="this.closest('.modal-backdrop').remove()">
                <div class="form-stack">
                    <div class="input">
                        <label class="input__label" for="add-widget-metric">{{ _("Metric") }}</label>
                        <select id="add-widget-metric" name="metric_type_id" class="input__field">
                            {% for m in metrics %}
                            <option value="{{ m.id }}">{{ m.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="input">
                        <label class="input__label" for="add-widget-size">{{ _("Size") }}</label>
                        <select id="add-widget-size" name="size" class="input__field">
                            <option value="small">{{ _("Small (1 column)") }}</option>
                            <option value="medium" selected>{{ _("Medium (2 columns)") }}</option>
                            <option value="large">{{ _("Large (4 columns)") }}</option>
                        </select>
                    </div>

                    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
                        {{ btn(_("Add"), variant="primary") }}
                        {{ btn(_("Cancel"), variant="ghost", type="button", hyperscript="on click remove closest .modal-backdrop") }}
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
