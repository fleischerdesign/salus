<div class="modal-backdrop" onclick="if(event.target===this)this.remove()">
    <div class="modal-content">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Add Widget</h3>
                <button class="btn-ghost" onclick="this.closest('.modal-backdrop').remove()">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form hx-post="/dashboard/widgets/add"
                  hx-target="closest .modal-backdrop"
                  hx-swap="outerHTML">
                <div class="form-stack">
                    <div class="input-group">
                        <label for="add-widget-metric">Metric</label>
                        <select name="metric_type_id" id="add-widget-metric">
                            {% for m in metrics %}
                            <option value="{{ m.id }}">{{ m.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="add-widget-size">Size</label>
                        <select name="size" id="add-widget-size">
                            <option value="small">Small (1 column)</option>
                            <option value="medium" selected>Medium (2 columns)</option>
                            <option value="large">Large (4 columns)</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn">Add</button>
                        <button type="button" class="btn-ghost"
                                onclick="this.closest('.modal-backdrop').remove()">Cancel</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
