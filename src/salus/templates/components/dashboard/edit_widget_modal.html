{% from "components/ui/modal.html" import modal %}
{% from "components/ui/select.html" import select %}

{% call modal(title=_("Edit Widget")) %}
<form hx-put="/dashboard/widgets/{{ widget.id }}"
      hx-on::afterRequest="this.closest('.modal-backdrop').remove()">
    <div class="form-stack">
        {% call select(name="size", label=_("Size"), id="edit-widget-size") %}
            <option value="small" {% if widget.size.value == 'small' %}selected{% endif %}>{{ _("Small (1 column)") }}</option>
            <option value="medium" {% if widget.size.value == 'medium' %}selected{% endif %}>{{ _("Medium (2 columns)") }}</option>
            <option value="large" {% if widget.size.value == 'large' %}selected{% endif %}>{{ _("Large (4 columns)") }}</option>
        {% endcall %}

        <div class="form-actions">
            <button type="submit" class="btn">{{ _("Save") }}</button>
            <button type="button" class="btn-ghost"
                    onclick="this.closest('.modal-backdrop').remove()">{{ _("Cancel") }}</button>
        </div>
    </div>
</form>
{% endcall %}
