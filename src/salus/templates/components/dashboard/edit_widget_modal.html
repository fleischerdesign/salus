{% from "components/ui/btn/macro.html" import btn %}

<div class="modal-backdrop" data-open role="dialog" aria-modal="true" aria-labelledby="edit-widget-title"
     _="on click if event.target === me then remove me end
        on keydown[key is 'Escape'] remove me">
    <div class="modal-content">
        <button class="modal__close" aria-label="Close" type="button"
                _="on click remove closest .modal-backdrop">
            <span class="material-symbols-outlined" aria-hidden="true">close</span>
        </button>
        <h2 class="modal__title" id="edit-widget-title">{{ _("Edit Widget") }}</h2>
        <div class="modal__body">
            <form hx-put="/dashboard/widgets/{{ widget.id }}"
                  hx-on::afterRequest="this.closest('.modal-backdrop').remove()">
                <div class="form-stack">
                    <div class="input">
                        <label class="input__label" for="edit-widget-size">{{ _("Size") }}</label>
                        <select id="edit-widget-size" name="size" class="input__field">
                            <option value="small" {% if widget.size.value == 'small' %}selected{% endif %}>{{ _("Small (1 column)") }}</option>
                            <option value="medium" {% if widget.size.value == 'medium' %}selected{% endif %}>{{ _("Medium (2 columns)") }}</option>
                            <option value="large" {% if widget.size.value == 'large' %}selected{% endif %}>{{ _("Large (4 columns)") }}</option>
                        </select>
                    </div>

                    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
                        {{ btn(_("Save"), variant="primary") }}
                        <button type="button" class="btn" data-variant="ghost"
                                _="on click remove closest .modal-backdrop">{{ _("Cancel") }}</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
