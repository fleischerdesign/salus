<div class="day-navigator">
    <button class="btn-icon"
            hx-get="/dashboard/grid?date={{ prev_date }}"
            hx-target="#dashboard-content"
            hx-swap="outerHTML"
            aria-label="{{ _("Previous day") }}">
        <span class="material-symbols-outlined">chevron_left</span>
    </button>

    <button class="day-navigator__date" type="button" id="day-navigator-date" title="{{ _("Pick a date") }}"
            onclick="document.getElementById('day-picker').showPicker()">
        {{ display_date_formatted }}
    </button>
    <input type="date" id="day-picker" value="{{ display_date }}"
           style="opacity:0;position:absolute;width:1px;height:1px;overflow:hidden;"
           onchange="htmx.ajax('GET','/dashboard/grid?date='+this.value,{target:'#dashboard-content',swap:'outerHTML'})">

    {% if can_go_next %}
    <button class="btn-icon"
            hx-get="/dashboard/grid?date={{ next_date }}"
            hx-target="#dashboard-content"
            hx-swap="outerHTML"
            aria-label="{{ _("Next day") }}">
        <span class="material-symbols-outlined">chevron_right</span>
    </button>
    {% else %}
    <span class="btn-icon" style="visibility:hidden;" aria-hidden="true">
        <span class="material-symbols-outlined">chevron_right</span>
    </span>
    {% endif %}

    {% if not is_today %}
    {{ btn(_("Today"), variant="primary", size="sm",
           hx_get="/dashboard/grid",
           hx_target="#dashboard-content",
           hx_swap="outerHTML") }}
    {% endif %}
</div>
