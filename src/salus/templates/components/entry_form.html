<div class="modal-backdrop" onclick="if(event.target===this)this.remove()">
    <div class="modal-content">
        <div class="card">
            <form
                {% if entry %}hx-put="/entries/{{ entry.id }}"{% else %}hx-post="/entries"{% endif %}
                hx-target="body"
                hx-push-url="true"
            >
                <div class="form-stack">
                    <div class="input-group">
                        <label for="entry-metric">{{ _("Metric") }}</label>
                        <select id="entry-metric" name="metric_type_id" required>
                            {% for m in metrics %}
                            <option value="{{ m.id }}"
                                {% if entry and entry.metric_type_id == m.id %}selected{% endif %}
                                {% if not entry and selected_metric_id == m.id %}selected{% endif %}>
                                {{ m.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="entry-value">{{ _("Value") }}</label>
                <input type="text" id="entry-value" name="value" value="{{ entry.display_value if entry else '' }}" required>
            </div>
            <div class="input-group">
                <label for="entry-timestamp">{{ _("Timestamp") }}</label>
                <input type="datetime-local" id="entry-timestamp" name="timestamp"
                       value="{{ entry.start_time.strftime('%Y-%m-%dT%H:%M') if entry and entry.start_time else '' }}">
                    </div>
                    <div class="input-group">
                        <label for="entry-notes">{{ _("Notes") }}</label>
                        <input type="text" id="entry-notes" name="notes" value="{{ entry.notes if entry else '' }}">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn">{{ _("Save") }}</button>
                        <button type="button" class="btn-ghost" onclick="this.closest('.modal-backdrop').remove()">{{ _("Cancel") }}</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
