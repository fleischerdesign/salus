{% macro alert(type="info", message="") %}
<div class="alert alert-{{ type }}" style="padding: 12px; border-radius: var(--border-radius-md); margin-bottom: 16px; display: flex; align-items: flex-start; gap: 8px;">
    <span class="material-symbols-outlined">
        {%- if type == "error" %}error{% elif type == "success" %}check_circle{% else %}info{% endif -%}
    </span>
    {% if caller %}
        <div>{{ caller() }}</div>
    {% else %}
        <span>{{ message }}</span>
    {% endif %}
</div>
{% endmacro %}
