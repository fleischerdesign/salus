{% macro select(name, label=None, required=False, id=None) %}
<div class="input-group">
    {% if label %}
    <label for="{{ id or name }}">{{ label }}</label>
    {% endif %}
    <select id="{{ id or name }}" name="{{ name }}" {% if required %}required{% endif %}>
        {{ caller() }}
    </select>
</div>
{% endmacro %}
