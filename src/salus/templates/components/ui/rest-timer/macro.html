{# vim: set ft=htmldjango: Rest Timer Pill — @component rest-timer #}
{% macro rest_timer() %}
<div id="rest-timer-pill" class="rest-timer-pill" data-active="false" role="timer">
    <span class="rest-timer-pill__icon material-symbols-outlined" aria-hidden="true">timer</span>
    <span id="rest-timer-countdown">0s</span>
    <button id="rest-timer-add-btn" class="rest-timer-pill__btn" type="button">+30s</button>
    <button id="rest-timer-close-btn" class="rest-timer-pill__close" type="button" aria-label="Dismiss timer">
        <span class="material-symbols-outlined" style="font-size:16px">close</span>
    </button>
</div>
{% endmacro %}
