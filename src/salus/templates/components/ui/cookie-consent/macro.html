{# vim: set ft=htmldjango: Cookie Consent #}
{% macro cookie_consent() %}
    <div class="cookie-banner" role="dialog" aria-label="Cookie consent" id="cookie-banner">
        <span class="cookie-banner__icon material-symbols-outlined" aria-hidden="true">cookie</span>
        <span class="cookie-banner__text">
            We use cookies to provide core functionality. Optional cookies help us improve your experience.
        </span>
        <div class="cookie-banner__actions">
            <button class="btn" data-variant="primary"
                _="on click remove #cookie-banner">Accept All</button>
            <button class="btn" data-variant="ghost" style="color: var(--color-slate-300)"
                _="on click remove #cookie-banner">Settings</button>
        </div>
    </div>
{% endmacro %}
