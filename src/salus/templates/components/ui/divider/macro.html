{# vim: set ft=htmldjango: Divider — @component divider #}
{% macro divider(label=none, spacing="default") %}
    {% if label %}
    <div class="divider-label">
        <span class="divider-label__text">{{ label }}</span>
    </div>
    {% else %}
    <hr class="divider divider--{{ spacing }}" aria-hidden="true">
    {% endif %}
{% endmacro %}
