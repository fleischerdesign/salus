{# vim: set ft=htmldjango:
   Scroll to Top — @component scroll-to-top
   Usage: {{ scroll_to_top() }}
 #}

{% macro scroll_to_top(threshold=300) %}
    <button
        class="scroll-top"
        aria-label="Scroll to top"
        type="button"
        _="init set threshold to {{ threshold }}
           on scroll from window
               if window.scrollY > threshold
                   add @data-visible
               else
                   remove @data-visible
               end
           end
           on click
               window.scrollTo({top: 0, behavior: 'smooth'})
           end">
        <span class="material-symbols-outlined" aria-hidden="true" style="font-size:20px">arrow_upward</span>
    </button>
{% endmacro %}
