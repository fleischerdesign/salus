{# vim: set ft=htmldjango: Icon — @component icon #}
{% macro icon(name, size=24, filled=false, aria_hidden=true) %}
    {% set extra_class = kwargs.get("class") %}
    <span class="material-symbols-outlined icon icon--{{ size }}{% if extra_class %} {{ extra_class }}{% endif %}" 
          {% if filled %}data-filled{% endif %} 
          {% if aria_hidden %}aria-hidden="true"{% endif %}
          {{ kwargs | render_attrs(exclude=['class']) }}>{{ name }}</span>
{% endmacro %}
