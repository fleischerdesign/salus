{% from "components/ui/card.html" import card %}
{% macro modal(title=None, id=None) %}
{% set outer_caller = caller %}
<div class="modal-backdrop" onclick="if(event.target===this)this.remove()" {% if id %}id="{{ id }}"{% endif %}>
    <div class="modal-content">
        {% call card(title=title) %}
            {{ outer_caller() }}
        {% endcall %}
    </div>
</div>
{% endmacro %}
