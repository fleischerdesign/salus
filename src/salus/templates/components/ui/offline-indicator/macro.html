{# vim: set ft=htmldjango: Offline Indicator #}
{% macro offline_indicator() %}
    <div class="offline-banner" role="alert" aria-live="assertive"
         style="display:none"
         _="init
            on online from window hide me then
                set @data-state to 'restored' then show me then
                wait 2s then hide me
            end
            on offline from window
                set @data-state to 'offline' then show me
            end">
        <span class="offline-banner__icon material-symbols-outlined" aria-hidden="true">cloud_off</span>
        <span class="offline-banner__text">You are offline. Changes will sync when connection is restored.</span>
    </div>
{% endmacro %}
