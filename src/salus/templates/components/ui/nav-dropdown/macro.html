{# vim: set ft=htmldjango: Nav Dropdown #}
{% macro nav_dropdown(label) %}
    <div class="nav-dropdown">
        <button class="nav-dropdown__trigger" aria-expanded="false" aria-haspopup="true" type="button"
                _="on click if @data-open then remove @data-open else add @data-open end
                   on click outside remove @data-open">
            {{ label }} <span class="nav-dropdown__chevron material-symbols-outlined" aria-hidden="true">expand_more</span>
        </button>
        <div class="nav-dropdown__menu" role="menu">{% if caller is defined %}{{ caller() }}{% endif %}</div>
    </div>
{% endmacro %}

{% macro nav_dropdown_item(text, href, current=false) %}
    <a href="{{ href }}" class="nav-dropdown__item" role="menuitem" {% if current %}aria-current="page"{% endif %}>{{ text }}</a>
{% endmacro %}
