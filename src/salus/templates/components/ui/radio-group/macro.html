{# vim: set ft=htmldjango: Radio Group #}
{% macro radio_group(name, options=[], selected=none) %}
    <div class="radio-group" role="radiogroup">
        {% for opt in options %}
        <label style="position:relative">
            <input type="radio" name="{{ name }}" value="{{ opt.value }}" {% if opt.value == selected %}checked{% endif %}>
            <span class="radio-group__option">{{ opt.label }}</span>
        </label>
        {% endfor %}
    </div>
{% endmacro %}
