{# vim: set ft=htmldjango: File Upload #}
{% macro upload(name="file", accept=none, label="Click or drag file to upload", hint="Supported formats: CSV, JSON", id=none) %}
    {% set field_id = id or name %}
    <label class="upload-zone" for="{{ field_id }}"
           _="on dragover halt add @data-dragover
              on dragleave remove @data-dragover
              on drop halt remove @data-dragover">
        <span class="upload-zone__icon material-symbols-outlined" aria-hidden="true">upload_file</span>
        <span class="upload-zone__label">{{ label }}</span>
        {% if hint %}<span class="upload-zone__hint">{{ hint }}</span>{% endif %}
        <input type="file" id="{{ field_id }}" name="{{ name }}"
               {% if accept %}accept="{{ accept }}"{% endif %}>
    </label>
{% endmacro %}
