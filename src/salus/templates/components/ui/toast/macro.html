{# vim: set ft=htmldjango: Toast — @component toast #}
{% macro toast(message, variant="success", id=none) %}
    {% set icons = {"success": "check_circle", "error": "error", "warning": "warning", "info": "info"} %}
    <div class="toast" data-variant="{{ variant }}" id="{{ id or '' }}" role="{% if variant == 'error' %}alert{% else %}status{% endif %}">
        <span class="toast__icon material-symbols-outlined" aria-hidden="true">{{ icons[variant] }}</span>
        <span class="toast__message">{{ message }}</span>
        <button class="toast__close material-symbols-outlined" aria-label="Dismiss" type="button"
            _="on click remove closest .toast">close</button>
    </div>
{% endmacro %}
