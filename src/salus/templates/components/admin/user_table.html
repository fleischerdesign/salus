<div id="admin-user-table">
    <table class="data-grid">
        <thead>
            <tr>
                <th>User</th>
                <th>Email</th>
                <th>Admin</th>
                <th>Active</th>
                <th>Entries</th>
                <th>Goals</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr id="admin-user-{{ u.id }}">
                <td>
                    <strong>{{ u.display_name or u.username }}</strong>
                    <br>
                    <span class="text-muted">{{ u.username }}</span>
                </td>
                <td>{{ u.email or '-' }}</td>
                <td>
                    <span class="chip {% if u.is_admin %}chip-success{% else %}chip-neutral{% endif %}" style="font-size:11px;">
                        {{ 'Yes' if u.is_admin else 'No' }}
                    </span>
                </td>
                <td>
                    <span class="chip {% if u.is_active %}chip-success{% else %}chip-error{% endif %}" style="font-size:11px;">
                        {{ 'Active' if u.is_active else 'Inactive' }}
                    </span>
                </td>
                <td>{{ u.measurement_count }}</td>
                <td>{{ u.goal_count }}</td>
                <td>
                    <div class="flex gap-sm">
                        <button class="btn-sm"
                                hx-get="/admin/users/{{ u.id }}/detail"
                                hx-target="#admin-user-detail"
                                hx-swap="innerHTML">
                            Detail
                        </button>
                        <button class="btn-sm"
                                hx-post="/admin/users/{{ u.id }}/toggle-admin"
                                hx-target="#admin-user-table"
                                hx-swap="outerHTML">
                            {{ 'Demote' if u.is_admin else 'Make Admin' }}
                        </button>
                        <button class="btn-sm {{ 'btn-danger' if u.is_active else '' }}"
                                hx-post="/admin/users/{{ u.id }}/toggle-active"
                                hx-target="#admin-user-table"
                                hx-swap="outerHTML">
                            {{ 'Deactivate' if u.is_active else 'Activate' }}
                        </button>
                        <button class="btn-danger btn-sm"
                                hx-delete="/admin/users/{{ u.id }}"
                                hx-target="#admin-user-table"
                                hx-swap="outerHTML"
                                hx-confirm="Delete user '{{ u.username }}' and all their data?">
                            Delete
                        </button>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
