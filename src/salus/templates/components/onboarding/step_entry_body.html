<div class="onboarding-step-body" id="onboarding-step-{{ step_index }}-body">
    <form hx-post="/onboarding/entry"
          hx-target="closest .onboarding-step-body"
          hx-swap="innerHTML"
          class="form-stack">
        <div class="input-group">
            <label for="ob-entry-metric-{{ step_index }}">Metric</label>
            <select id="ob-entry-metric-{{ step_index }}" name="metric_type_id" required>
                <option value="">— Select Metric —</option>
                {% for m in metrics %}
                <option value="{{ m.id }}">{{ m.name }}{% if m.unit %} ({{ m.unit }}){% endif %}</option>
                {% endfor %}
            </select>
        </div>
        <div class="input-group">
            <label for="ob-entry-value-{{ step_index }}">Value</label>
            <input type="text" id="ob-entry-value-{{ step_index }}" name="value" required placeholder="e.g. 82.5">
        </div>
        <button type="submit" class="btn btn-sm">Log Entry</button>
    </form>
</div>
