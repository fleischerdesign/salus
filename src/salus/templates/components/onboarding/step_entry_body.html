<div class="onboarding-step-body" id="onboarding-step-{{ step_index }}-body">
    <form hx-post="/onboarding/entry"
          hx-target="closest .onboarding-step-body"
          hx-swap="innerHTML">
        {% call form_stack() %}
            <div class="input">
                <label class="input__label" for="ob-entry-metric-{{ step_index }}">{{ _("Metric") }}</label>
                <select id="ob-entry-metric-{{ step_index }}" name="metric_type_id" class="input__field" required>
                    <option value="">— {{ _("Select Metric") }} —</option>
                    {% for m in metrics %}
                    <option value="{{ m.id }}">{{ m.name }}{% if m.unit %} ({{ m.unit }}){% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            {{ input(name="value", label=_("Value"), id="ob-entry-value-" + step_index|string, required=true, attrs={"placeholder": "e.g. 82.5"}) }}
            {{ btn(_("Log Entry"), variant="primary", size="sm", type="submit") }}
        {% endcall %}
    </form>
</div>
