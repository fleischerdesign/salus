<div class="onboarding-step-body" id="onboarding-step-{{ step_index }}-body">
    <form hx-post="/onboarding/token"
          hx-target="closest .onboarding-step-body"
          hx-swap="innerHTML"
          class="form-stack">
        <div class="input-group">
            <label for="ob-token-label-{{ step_index }}">{{ _("Token Label") }}</label>
            <input type="text" id="ob-token-label-{{ step_index }}" name="label" placeholder="e.g. Samsung Health" required autofocus>
        </div>
        <input type="hidden" name="scopes" value="ingest:write">
        <button type="submit" class="btn btn-sm">{{ _("Generate Token") }}</button>
    </form>
</div>
