<div class="onboarding-step-body" id="onboarding-step-{{ step_index }}-body">
    <form hx-post="/onboarding/token"
          hx-target="closest .onboarding-step-body"
          hx-swap="innerHTML">
        {% call form_stack() %}
            {{ input(name="label", label=_("Token Label"), id="ob-token-label-" + step_index|string, placeholder="e.g. Samsung Health", required=true, attrs={"autofocus": "true"}) }}
            <input type="hidden" name="scopes" value="ingest:write">
            {{ btn(_("Generate Token"), variant="primary", size="sm", type="submit") }}
        {% endcall %}
    </form>
</div>
