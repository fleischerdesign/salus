<div class="card onboarding-card">
    <div class="card-header">
        <h3 class="card-title">Getting Started</h3>
        <button class="btn-icon onboarding-card-close"
                hx-post="/onboarding/dismiss"
                hx-target="#onboarding-card"
                hx-swap="outerHTML"
                title="Dismiss">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>
    <div class="onboarding-checklist">
        <div class="onboarding-checklist-item"
             hx-get="/onboarding/step/0/modal"
             hx-target="body"
             hx-swap="beforeend">
            <span class="material-symbols-outlined onboarding-check-icon">sync</span>
            <span class="onboarding-check-title">Connect a data source</span>
            <span class="onboarding-check-desc">Generate an API token for webhook ingestion.</span>
        </div>
        <div class="onboarding-checklist-item"
             hx-get="/onboarding/step/1/modal"
             hx-target="body"
             hx-swap="beforeend">
            <span class="material-symbols-outlined onboarding-check-icon">edit_note</span>
            <span class="onboarding-check-title">Log your first entry</span>
            <span class="onboarding-check-desc">Track weight, mood, or any custom metric.</span>
        </div>
        <div class="onboarding-checklist-item"
             hx-get="/onboarding/step/2/modal"
             hx-target="body"
             hx-swap="beforeend">
            <span class="material-symbols-outlined onboarding-check-icon">track_changes</span>
            <span class="onboarding-check-title">Set your first goal</span>
            <span class="onboarding-check-desc">E.g. walk 10,000 steps or sleep 8 hours.</span>
        </div>
    </div>
    <button class="btn-ghost onboarding-card-dismiss"
            hx-post="/onboarding/dismiss"
            hx-target="#onboarding-card"
            hx-swap="outerHTML">
        Dismiss
    </button>
</div>
