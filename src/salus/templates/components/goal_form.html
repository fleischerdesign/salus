<div class="modal-backdrop" data-open role="dialog" aria-modal="true" aria-labelledby="goal-form-title"
     _="on click if event.target === me then remove me end
        on keydown[key is 'Escape'] remove me">
    <div class="modal-content">
        <button class="modal__close" aria-label="Close" type="button"
                _="on click remove closest .modal-backdrop">
            <span class="material-symbols-outlined" aria-hidden="true">close</span>
        </button>
        <h2 class="modal__title" id="goal-form-title">{{ _("New Goal") }}</h2>
        <div class="modal__body">
            <form hx-post="/goals" hx-target="body">
                <div class="form-stack">
                    <div class="input">
                        <label class="input__label" for="goal-metric">{{ _("Metric") }}</label>
                        <select id="goal-metric" name="metric_type_id" class="input__field" required>
                            <option value="">— {{ _("Select") }} —</option>
                            {% for m in all_metrics %}
                            <option value="{{ m.id }}">{{ m.name }}{% if m.unit %} ({{ m.unit }}){% endif %}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div style="display:flex;gap:16px">
                        <div style="flex:1">
                            {{ input(name="target_value", label=_("Target"), type="number", required=true, placeholder="e.g. 80", id="goal-target") }}
                        </div>
                        <div style="flex:1">
                            <div class="input">
                                <label class="input__label" for="goal-direction">{{ _("Direction") }}</label>
                                <select id="goal-direction" name="direction" class="input__field">
                                    <option value="increase">{{ _("Increase") }}</option>
                                    <option value="decrease">{{ _("Decrease") }}</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label style="font:var(--font-label-md);color:var(--color-on-surface);display:block;margin-bottom:8px">{{ _("Frequency") }}</label>
                        <div style="display:flex;gap:8px;flex-wrap:wrap">
                            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font:var(--font-body-sm)">
                                <input type="radio" name="frequency" value="daily" checked> {{ _("Daily") }}
                            </label>
                            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font:var(--font-body-sm)">
                                <input type="radio" name="frequency" value="weekly"> {{ _("Weekly") }}
                            </label>
                            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font:var(--font-body-sm)">
                                <input type="radio" name="frequency" value="once"> {{ _("Once") }}
                            </label>
                        </div>
                    </div>

                    {{ input(name="deadline", label=_("Deadline (only for \"once\")"), type="date", id="goal-deadline") }}

                    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
                        {{ btn(_("Create Goal"), variant="primary") }}
                        <button type="button" class="btn" data-variant="ghost"
                                _="on click remove closest .modal-backdrop">{{ _("Cancel") }}</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
