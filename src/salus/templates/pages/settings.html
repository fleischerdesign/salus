{% extends "base.html" %}
{% block title_suffix %} — {{ _("Settings") }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ _("Account Settings") }}</h1>
</div>

<div class="tabbed-layout">
    <!-- Left Sidebar Sub-Navigation -->
    <aside class="tabbed-sidebar" onclick="const a = event.target.closest('.tabbed-sidebar-link'); if(a){ this.querySelectorAll('.tabbed-sidebar-link').forEach(el => el.classList.remove('active')); a.classList.add('active'); }">
        <a hx-get="/settings" hx-target="#settings-content" hx-push-url="true"
           class="tabbed-sidebar-link {% if active_tab == 'account' %}active{% endif %}">
            <span class="material-symbols-outlined">person</span>
            {{ _("Account") }}
        </a>
        <a hx-get="/settings/privacy" hx-target="#settings-content" hx-push-url="true"
           class="tabbed-sidebar-link {% if active_tab == 'privacy' %}active{% endif %}">
            <span class="material-symbols-outlined">security</span>
            {{ _("Privacy") }}
        </a>
        <a hx-get="/settings/shares" hx-target="#settings-content" hx-push-url="true"
           class="tabbed-sidebar-link {% if active_tab == 'shares' %}active{% endif %}">
            <span class="material-symbols-outlined">share</span>
            {{ _("Shares") }}
        </a>
    </aside>

    <!-- Right Panel Content -->
    <div id="settings-content" class="flex-1">
        {% include "pages/settings_tabs/" + active_tab + ".html" %}
    </div>
</div>
{% endblock %}
