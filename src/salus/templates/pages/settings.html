{% extends "base.html" %}
{% block title_suffix %} — {{ _("Settings") }}{% endblock %}
{% block content %}

<h1 style="font:var(--font-headline-lg);margin-bottom:24px">{{ _("Account Settings") }}</h1>

<div class="tabbed-layout">
    <nav class="tabbed-sidebar" aria-label="Settings navigation">
        <a hx-get="/settings" hx-target="#settings-content" hx-push-url="true"
           class="tabbed-sidebar__link {% if active_tab == 'account' %}active{% endif %}"
           {% if active_tab == 'account' %}aria-current="page"{% endif %}>
            <span class="material-symbols-outlined" style="font-size:20px;vertical-align:middle;margin-right:8px">person</span>
            {{ _("Account") }}
        </a>
        <a hx-get="/settings/privacy" hx-target="#settings-content" hx-push-url="true"
           class="tabbed-sidebar__link {% if active_tab == 'privacy' %}active{% endif %}"
           {% if active_tab == 'privacy' %}aria-current="page"{% endif %}>
            <span class="material-symbols-outlined" style="font-size:20px;vertical-align:middle;margin-right:8px">security</span>
            {{ _("Privacy") }}
        </a>
        <a hx-get="/settings/shares" hx-target="#settings-content" hx-push-url="true"
           class="tabbed-sidebar__link {% if active_tab == 'shares' %}active{% endif %}"
           {% if active_tab == 'shares' %}aria-current="page"{% endif %}>
            <span class="material-symbols-outlined" style="font-size:20px;vertical-align:middle;margin-right:8px">share</span>
            {{ _("Shares") }}
        </a>
    </nav>

    <div id="settings-content" style="flex:1;min-width:0;padding:24px">
        {% include "pages/settings_tabs/" + active_tab + ".html" %}
    </div>
</div>

{% endblock %}
