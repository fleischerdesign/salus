<div class="settings-section">
    <div class="card">
        <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid var(--color-slate-100);">
            <h3 class="card-title">{{ _("Developer Plugins") }}</h3>
            <button class="btn btn-sm"
                    hx-get="/admin/plugins/upload-modal"
                    hx-target="#modal-container"
                    hx-swap="innerHTML">
                {{ _("Install Plugin") }}
            </button>
        </div>
        <div id="admin-plugins-container" style="padding-top:12px;">
            {% include "components/admin/plugin_table.html" %}
        </div>
    </div>
</div>

<div id="modal-container"></div>
