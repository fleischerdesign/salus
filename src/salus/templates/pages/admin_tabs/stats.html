<div class="card">
    <div class="card__header">
        <h3 class="card__header-title">{{ _("System Statistics") }}</h3>
    </div>
    <div class="card__body">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px">
            <div class="card" data-variant="flat" style="text-align:center">
                <div class="stat__value stat__value--hero" style="color:var(--color-primary);margin-bottom:4px">{{ stats.total_users }}</div>
                <div class="stat__label" style="text-transform:uppercase">{{ _("Total Users") }}</div>
            </div>
            <div class="card" data-variant="flat" style="text-align:center">
                <div class="stat__value stat__value--hero" style="color:var(--color-primary);margin-bottom:4px">{{ stats.total_measurements }}</div>
                <div class="stat__label" style="text-transform:uppercase">{{ _("Total Measurements") }}</div>
            </div>
            <div class="card" data-variant="flat" style="text-align:center">
                <div class="stat__value stat__value--hero" style="color:var(--color-primary);margin-bottom:4px">{{ stats.total_metric_types }}</div>
                <div class="stat__label" style="text-transform:uppercase">{{ _("Metric Types") }}</div>
            </div>
            <div class="card" data-variant="flat" style="text-align:center">
                <div class="stat__value stat__value--hero" style="color:var(--color-primary);margin-bottom:4px">{{ stats.total_goals }}</div>
                <div class="stat__label" style="text-transform:uppercase">{{ _("Total Goals") }}</div>
            </div>
            <div class="card" data-variant="flat" style="text-align:center">
                <div class="stat__value stat__value--hero" style="color:var(--color-primary);margin-bottom:4px">{{ storage.db_size }}</div>
                <div class="stat__label" style="text-transform:uppercase">{{ _("Database Size") }}</div>
            </div>
        </div>
    </div>
</div>
