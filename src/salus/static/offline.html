<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salus — Offline</title>
    <link rel="stylesheet" href="/static/vendor/fonts.css">
    <link rel="stylesheet" href="/static/tokens.css">
    <link rel="stylesheet" href="/static/components.css">
    <style>
        body {
            background: var(--color-surface-container-lowest);
            color: var(--color-slate-800);
            font-family: var(--font-family-body);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
        }
        .offline-container {
            max-width: 440px;
            text-align: center;
            background: #fff;
            padding: 40px 32px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--color-slate-100);
        }
        .offline-icon {
            font-size: 64px;
            color: var(--color-primary);
            margin-bottom: 24px;
            animation: pulse 2s infinite ease-in-out;
            display: inline-block;
        }
        h1 {
            font: var(--font-headline-lg);
            margin: 0 0 12px 0;
            color: var(--color-slate-900);
        }
        p {
            font: var(--font-body-md);
            color: var(--color-slate-500);
            margin: 0 0 24px 0;
            line-height: 1.6;
        }
        .action-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            background: var(--color-primary);
            color: #fff;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font: var(--font-label-md);
            font-weight: 700;
            transition: all var(--duration-fast) var(--ease-default);
            box-shadow: var(--shadow-sm);
            border: none;
            cursor: pointer;
        }
        .action-button:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <span class="material-symbols-outlined offline-icon">cloud_off</span>
        <h1>You are Offline</h1>
        <p>
            It looks like you lost connection. But don't worry, Salus continues to track your workout locally and will sync once you are back online!
        </p>
        <button class="action-button" onclick="window.location.reload()">
            <span class="material-symbols-outlined" style="font-size: 18px">refresh</span>
            Try Reconnecting
        </button>
    </div>
</body>
</html>
